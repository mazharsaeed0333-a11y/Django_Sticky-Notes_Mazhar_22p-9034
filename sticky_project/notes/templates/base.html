<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Sticky Notes{% endblock %}</title>
    <style>
      :root { --bg: #0b1220; --card: #0f1b33; --text: #e8eefc; --muted: #a9b6d3; --border: rgba(255,255,255,.12); }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: radial-gradient(1200px 700px at 20% 0%, #182a55 0%, var(--bg) 55%); color: var(--text); }
      a { color: inherit; text-decoration: none; }
      .container { max-width: 1000px; margin: 0 auto; padding: 18px; }
      .nav { display:flex; align-items:center; justify-content:space-between; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); backdrop-filter: blur(10px); background: rgba(15,27,51,.55); position: sticky; top: 0; }
      .brand { font-weight: 700; letter-spacing: .2px; }
      .nav-links { display:flex; align-items:center; gap: 10px; flex-wrap: wrap; }
      .pill { padding: 8px 10px; border: 1px solid var(--border); border-radius: 999px; background: rgba(255,255,255,.04); }
      .pill:hover { background: rgba(255,255,255,.08); }
      .content { padding: 18px 0; }
      .card { border: 1px solid var(--border); border-radius: 14px; background: rgba(15,27,51,.55); padding: 14px; }
      .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; }
      .note { border-radius: 14px; padding: 14px; color: #1b1b1b; border: 1px solid rgba(0,0,0,.08); box-shadow: 0 10px 24px rgba(0,0,0,.18); }
      .note h3 { margin: 0 0 8px 0; font-size: 16px; }
      .note p { margin: 0; white-space: pre-wrap; }
      .note .meta { margin-top: 10px; display:flex; gap: 8px; flex-wrap: wrap; }
      .btn { display:inline-block; padding: 8px 10px; border-radius: 10px; border: 1px solid rgba(0,0,0,.18); background: rgba(255,255,255,.55); }
      .btn:hover { background: rgba(255,255,255,.75); }
      .btn-danger { background: rgba(255, 80, 80, .25); border-color: rgba(255, 80, 80, .35); }
      .btn-danger:hover { background: rgba(255, 80, 80, .35); }
      form .field { margin-bottom: 12px; }
      label { display:block; margin-bottom: 6px; color: var(--muted); }
      input[type="text"], input[type="password"], textarea, input[type="color"] { width: 100%; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,.15); color: var(--text); }
      input[type="color"] { padding: 6px; height: 44px; }
      .actions { display:flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      .help { color: var(--muted); font-size: 14px; }
      .errors { margin: 10px 0; padding: 10px 12px; border: 1px solid rgba(255, 110, 110, .35); background: rgba(255, 110, 110, .12); border-radius: 12px; }
      .errors ul { margin: 0; padding-left: 18px; }
    </style>
  </head>
  <body>
    <div class="nav">
      <div class="brand"><a href="{% url 'note_list' %}">Sticky Notes</a></div>
      <div class="nav-links">
        {% if user.is_authenticated %}
          <a class="pill" href="{% url 'note_list' %}">Notes</a>
          <a class="pill" href="{% url 'note_create' %}">New Note</a>
          <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button class="pill" type="submit">Logout</button>
          </form>
        {% else %}
          <a class="pill" href="{% url 'login' %}">Login</a>
          <a class="pill" href="{% url 'register' %}">Register</a>
        {% endif %}
      </div>
    </div>

    <div class="container">
      <div class="content">
        {% block content %}{% endblock %}
      </div>
    </div>
  </body>
</html>
